name: 'iOS Setup Environment'
description: 'Sets up the environment for iOS builds (Java, Ruby, Xcode tools)'
inputs:
  java:
    description: 'Whether to setup Java'
    required: false
    default: 'true'
  java_version:
    description: 'Java version'
    required: false
    default: '17'
  java_distribution:
    description: 'Java distribution'
    required: false
    default: 'zulu'
  ruby:
    description: 'Whether to setup Ruby'
    required: false
    default: 'true'
  ruby_version:
    description: 'Ruby version'
    required: false
    default: '3.4'
  gradle:
    description: 'Whether to setup Gradle'
    required: false
    default: 'true'
  gradle_cache_encryption_key:
    description: 'Gradle cache encryption key'
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup Java
      if: inputs.java == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: ${{ inputs.java_distribution }}
        java-version: ${{ inputs.java_version }}

    - name: Setup Ruby
      if: inputs.ruby == 'true'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby_version }}
        bundler-cache: true

    - name: Setup Gradle
      if: inputs.gradle == 'true'
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-encryption-key: ${{ inputs.gradle_cache_encryption_key }}