name: iOS KMP Self-hosted Release

on:
  workflow_call:
    inputs:
      use_git_lfs:
        description: Whether to download Git-LFS files.
        type: boolean
        required: false
        default: false
      custom_values:
        description: "Custom string that can contains values specified in your workflow file. Those values will be placed into environment variable. Example: \"CUSTOM-1: 1; CUSTOM-2: 2\""
        type: string
        required: false
      kmp_swift_package_integration:
        description: "Whether KMP is integrated in Xcode project as a Swift Package"
        type: boolean
        required: false
        default: false
      kmp_swift_package_path:
        description: "If `swift_package_integration` is 'true', then specifies a location of local Swift Package with Makefile. Example: 'iosApp/shared/KMP`"
        type: string
        required: false
        default: iosApp/shared/KMP
      kmp_swift_package_flavor:
        description: "Build flavor of KMP Package"
        type: string
        default: prod
        required: false
      java_version:
        description: "Java version to use"
        required: false
        type: string
        default: '17'
      java_distribution:
        description: "Java distribution to use"
        required: false
        type: string
        default: 'zulu'
      xcconfig_path:
        description: Path to the .xcconfig file. Selected secret properties will be appended to the end of this file.
        type: string
        required: false
        default: ""
      required_keys:
        description: Comma-separated list of required keys.
        type: string
        required: false
        default: ""
      custom_build_path:
        description: "Path to directory containing Fastfile. If not specified, uses iosApp. Example: iosApp/appA"
        type: string
        required: false
      checkout_depth:
        description: 'The depth of the git history to fetch for changelog generation.'
        type: number
        required: false
        default: 100
      changelog_fallback_lookback:
        description: 'The amount of time to look back for merge commits when no previous build commit is found. Default is 24 hours.'
        type: string
        required: false
        default: '24 hours'
      changelog_debug:
        description: "Enable debug mode for changelog generation. Default is false."
        type: boolean
        required: false
        default: false
      jira_transition:
        description: 'The name of the JIRA transition to apply to tickets found in merged branches.'
        type: string
        required: false
        default: 'Released'

    secrets:
      MATCH_PASSWORD:
        required: true
        description: >
          Password for decrypting of certificates and provisioning profiles.
      APP_STORE_CONNECT_API_KEY_KEY:
        required: true
        description: >
          Private App Store Connect API key for submitting build to App Store.
      APP_STORE_CONNECT_API_KEY_KEY_ID:
        required: true
        description: >
          Private App Store Connect API key for submitting build to App Store.
      APP_STORE_CONNECT_API_KEY_ISSUER_ID:
        required: true
        description: >
          Private App Store Connect API issuer key for submitting build to App Store.
      SECRET_PROPERTIES:
        required: false
        description: >
         Secrets in the format KEY = VALUE (one per line).
      JIRA_CONTEXT:
        required: false
        description: 'JIRA context for transitioning tickets.'

jobs:
  changelog:
    outputs:
      skip_build: ${{ steps.detect_changes.outputs.skip_build }}
      changelog: ${{ steps.detect_changes.outputs.changelog }}
      cache_key: ${{ steps.detect_changes.outputs.cache_key }}
      merged_branches: ${{ steps.detect_changes.outputs.merged_branches }}
    name: Detect changes and generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.checkout_depth }}
      - name: Detect changes and generate changelog
        id: detect_changes
        uses: futuredapp/.github/.github/actions/universal-detect-changes-and-generate-changelog@main
        with:
          debug: ${{ inputs.changelog_debug }}
          fallback_lookback: ${{ inputs.changelog_fallback_lookback }}
          cache_key_prefix: "release"

  build:
    name: Release build
    runs-on: self-hosted
    timeout-minutes: 30
    needs: changelog
    if: ${{ needs.changelog.outputs.skip_build != 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        lfs: ${{ inputs.use_git_lfs }}
    - name: Export secrets to .xcconfig file
      if: ${{ inputs.xcconfig_path != '' }}
      uses: futuredapp/.github/.github/actions/ios-export-secrets@main
      with:
        XCCONFIG_PATH: ${{ inputs.xcconfig_path }}
        SECRET_PROPERTIES: ${{ secrets.SECRET_PROPERTIES }}
        REQUIRED_KEYS: ${{ inputs.required_keys }}
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java_version }}
        distribution: ${{ inputs.java_distribution }}
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
    - name: Build KMP Package
      if: ${{ inputs.kmp_swift_package_integration }}
      env:
        KMP_BUILD_FLAVOR: ${{ inputs.kmp_swift_package_flavor }}
        KMP_FRAMEWORK_BUILD_TYPE: release
      run: |
        cd ${{ inputs.kmp_swift_package_path }}
        make build
    - name: Fastlane Release
      uses: futuredapp/.github/.github/actions/ios-fastlane-release@main
      with:
        match_password: ${{ secrets.MATCH_PASSWORD }}
        version_number: ${{ github.ref_name }}
        app_store_connect_api_key_key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        app_store_connect_api_key_key_id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
        app_store_connect_api_key_issuer_id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        custom_values: ${{ inputs.custom_values }}
        ios_root_path: iosApp
        custom_build_path: ${{ inputs.custom_build_path }}
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Build.ipa
        path: build_output/*.ipa
    - name: Upload dSYM
      uses: actions/upload-artifact@v4
      with:
        name: Build.app.dSYM.zip
        path: build_output/*.app.dSYM.zip
    - name: Save latest build commit SHA to file
      if: success()
      shell: bash
      run: |
        echo "${{ github.sha }}" > latest_builded_commit.txt
    
    - name: Store latest build commit SHA in cache
      if: success()
      uses: actions/cache/save@v4
      with:
        path: latest_builded_commit.txt
        key: ${{ needs.changelog.outputs.cache_key }}

  transition_jira_tickets:
    name: Transition JIRA tickets
    runs-on: ubuntu-latest
    needs: [build, changelog]
    if: success() && needs.changelog.outputs.skip_build != 'true'
    steps:
      - name: Check JIRA context
        id: check
        env:
          JIRA_CONTEXT: ${{ secrets.JIRA_CONTEXT }}
        run: |
          if [ -z "$JIRA_CONTEXT" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ JIRA ticket transition skipped - no JIRA context provided."
            echo "💡 Tip: You can automatically transition JIRA tickets by passing the 'JIRA_CONTEXT' secret."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Transition JIRA tickets
        if: steps.check.outputs.enabled == 'true'
        uses: futuredapp/.github/.github/actions/jira-transition-tickets@main
        with:.
          jira_context: ${{ secrets.JIRA_CONTEXT }}
          transition: ${{ inputs.jira_transition }}
          merged_branches: ${{ needs.changelog.outputs.merged_branches }}
