name: iOS KMP Self-hosted Build

on:
  workflow_call:
    inputs:
      use_git_lfs:
        description: Whether to download Git-LFS files.
        type: boolean
        required: false
        default: false
      custom_values:
        description: "Custom string that can contains values specified in your workflow file. Those values will be placed into environment variable. Example: \"CUSTOM-1: 1; CUSTOM-2: 2\""
        type: string
        required: false
      timeout_minutes:
        description: "Job timeout in minutes"
        type: number
        required: false
        default: 30
      kmp_swift_package_integration:
        description: "Whether KMP is integrated in Xcode project as a Swift Package"
        type: boolean
        required: false
        default: false
      kmp_swift_package_path:
        description: "If `swift_package_integration` is 'true', then specifies a location of local Swift Package with Makefile. Example: 'iosApp/shared/KMP`"
        type: string
        required: false
        default: iosApp/shared/KMP
      kmp_swift_package_flavor:
        description: "Build flavor of KMP Package"
        type: string
        default: prod
        required: false
      java_version:
        description: "Java version to use"
        required: false
        type: string
        default: '17'
      java_distribution:
        description: "Java distribution to use"
        required: false
        type: string
        default: 'zulu'
      xcconfig_path:
        description: Path to the .xcconfig file. Selected secret properties will be appended to the end of this file.
        type: string
        required: false
        default: ""
      required_keys:
        description: Comma-separated list of required keys.
        type: string
        required: false
        default: ""
      changelog:
        description: "Will be used as TestFlight changelog"
        type: string
        required: false
        default: ${{ github.event.pull_request.title }}
      checkout_depth:
        description: 'The depth of the git history to fetch for changelog generation.'
        type: number
        required: false
        default: 100
      changelog_fallback_lookback:
        description: 'The amount of time to look back for merge commits when no previous build commit is found. Default is 24 hours.'
        type: string
        required: false
        default: '24 hours'
      changelog_debug:
        description: "Enable debug mode for changelog generation. Default is false."
        type: boolean
        required: false
        default: false
      custom_build_path:
        description: "Path to directory containing Fastfile. If not specified, uses iosApp. Example: iosApp/appA"
        type: string
        required: false

    secrets:
      MATCH_PASSWORD:
        required: true
        description: >
          Password for decrypting of certificates and provisioning profiles.
      APP_STORE_CONNECT_API_KEY_KEY:
        required: true
        description: >
          Private App Store Connect API key for submitting build to App Store.
      APP_STORE_CONNECT_API_KEY_KEY_ID:
        required: true
        description: >
          Private App Store Connect API key for submitting build to App Store.
      APP_STORE_CONNECT_API_KEY_ISSUER_ID:
        required: true
        description: >
          Private App Store Connect API issuer key for submitting build to App Store.
      GRADLE_CACHE_ENCRYPTION_KEY:
        required: false
        description: "Configuration cache encryption key"
      SECRET_PROPERTIES:
        required: false
        description: >
         Secrets in the format KEY = VALUE (one per line).

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.set_outputs.outputs.skip_build }}
      changelog: ${{ steps.set_outputs.outputs.changelog }}
      cache_key: ${{ steps.detect_changes.outputs.cache_key }}
      merged_branches: ${{ steps.detect_changes.outputs.merged_branches }}
    steps:
      - name: Checkout
        if: ${{ inputs.changelog == '' || inputs.changelog == github.event.pull_request.title }}
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.checkout_depth }}
      - name: Detect changes and generate changelog
        if: ${{ inputs.changelog == '' || inputs.changelog == github.event.pull_request.title }}
        id: detect_changes
        uses: futuredapp/.github/.github/actions/universal-detect-changes-and-generate-changelog@main
        with:
          debug: ${{ inputs.changelog_debug }}
          fallback_lookback: ${{ inputs.changelog_fallback_lookback }}
      - name: Set outputs
        id: set_outputs
        run: |
          if [ -n "${{ inputs.changelog }}" ] && [ "${{ inputs.changelog }}" != "${{ github.event.pull_request.title }}" ]; then
            echo "changelog=${{ inputs.changelog }}" >> "$GITHUB_OUTPUT"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "changelog=${{ steps.detect_changes.outputs.changelog }}" >> "$GITHUB_OUTPUT"
            echo "skip_build=${{ steps.detect_changes.outputs.skip_build }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: self-hosted
    timeout-minutes: ${{ inputs.timeout_minutes }}
    needs: changelog
    if: ${{ needs.changelog.outputs.skip_build != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.use_git_lfs }}
      - name: Set up environment
        uses: futuredapp/.github/.github/actions/android-setup-environment@main
        with:
          java_version: ${{ inputs.java_version }}
          java_distribution: ${{ inputs.java_distribution }}
          gradle_cache_encryption_key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          ruby: 'false'
      - name: Build and upload to TestFlight
        uses: futuredapp/.github/.github/actions/ios-kmp-build@main
        with:
          match_password: ${{ secrets.MATCH_PASSWORD }}
          app_store_connect_api_key_key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          app_store_connect_api_key_key_id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          app_store_connect_api_key_issuer_id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          testflight_changelog: ${{ needs.changelog.outputs.changelog }}
          secret_xcconfig_path: ${{ inputs.xcconfig_path }}
          secret_properties: ${{ secrets.SECRET_PROPERTIES }}
          secret_required_keys: ${{ inputs.required_keys }}
          kmp_swift_package_integration: ${{ inputs.kmp_swift_package_integration }}
          kmp_swift_package_path: ${{ inputs.kmp_swift_package_path }}
          kmp_swift_package_flavor: ${{ inputs.kmp_swift_package_flavor }}
          custom_values: ${{ inputs.custom_values }}
          ios_custom_build_path: ${{ inputs.custom_build_path }}
      - name: Save latest build commit SHA to file
        if: success()
        shell: bash
        run: |
          echo "${{ github.sha }}" > latest_builded_commit.txt
      
      - name: Store latest build commit SHA in cache
        if: success() && (inputs.changelog == '' || inputs.changelog == github.event.pull_request.title)
        uses: actions/cache/save@v4
        with:
          path: latest_builded_commit.txt
          key: ${{ needs.changelog.outputs.cache_key }}
