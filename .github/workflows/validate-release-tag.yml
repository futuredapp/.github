name: Validate release tag

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate action refs match tag
        run: bash .github/scripts/validate-action-refs.sh "${GITHUB_REF#refs/tags/}"

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bats
        uses: bats-core/bats-action@4.0.0

      - name: Run tests
        run: bats -r .
