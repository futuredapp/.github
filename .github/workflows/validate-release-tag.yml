name: Validate release tag

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate action refs match tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          mismatched=()

          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            ref=$(echo "$line" | grep -oE 'futuredapp/\.github/.+@[^ ]+' | head -1)
            mismatched+=("  $file: $ref")
          done < <(grep -rn 'futuredapp/\.github/' .github/workflows/ .github/actions/ --include='*.yml' | grep -v "@${TAG}")

          if [ ${#mismatched[@]} -gt 0 ]; then
            echo "::error::Action refs not bumped to @${TAG}. Run: .github/scripts/bump-action-refs.sh ${TAG}"
            echo ""
            echo "Mismatched refs:"
            printf '%s\n' "${mismatched[@]}"
            exit 1
          fi

          echo "All action refs match @${TAG}"
